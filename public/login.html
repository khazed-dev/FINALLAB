<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="theme-login">
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">Khu vực Quản trị được Bảo vệ</p>
        <h1>Đăng nhập Dashboard SOC</h1>
        <p class="muted">
          Đăng nhập để xem telemetry máy chủ theo thời gian thực và điều khiển các cơ chế giảm thiểu.
        </p>
        <form id="loginForm" class="login-form">
          <label>
            Tên đăng nhập
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label>
            Mật khẩu
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="button primary">Đăng nhập</button>
        </form>
        <p id="loginMessage" class="login-message"></p>
      </section>
    </main>

    <script src="/static/login.js"></script>
  </body>
</html>
